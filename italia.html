<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#174a3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/app-icon-192.png" />
    <title>Sul da Itália 2026</title>
    <link rel="stylesheet" href="italia.css" />
  </head>
  <body>
    <header class="hero italy-hero">
      <div class="hero__image" aria-hidden="true"></div>
      <nav class="topbar" aria-label="Navegação principal">
        <div>
          <p class="eyebrow">Sul da Itália, 08-18 setembro 2026</p>
          <h1>Sul da Itália 2026</h1>
        </div>
        <div class="trip-actions">
          <button class="ghost-button install-button" id="installButton" type="button" hidden>Instalar app</button>
          <a class="ghost-button" href="index.html">Paris</a>
          <button class="ghost-button" id="printButton" type="button">Imprimir</button>
        </div>
      </nav>
      <section class="hero__content">
        <p class="kicker">Nápoles + Puglia</p>
        <h2>Agenda da viagem</h2>
        <p>Dias, horários, escolhas e informações práticas em um só lugar.</p>
      </section>
    </header>

    <main class="shell">
      <section class="panel base-panel" aria-labelledby="baseTitle">
        <div>
          <p class="eyebrow">Base</p>
          <h2 id="baseTitle"></h2>
        </div>
        <div class="base-grid" id="baseGrid"></div>
      </section>

      <section class="panel calendar-panel" aria-labelledby="calendarTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Calendário</p>
            <h2 id="calendarTitle">Dias da viagem</h2>
          </div>
          <span class="trip-chip">11 dias</span>
        </div>
        <div class="day-grid" id="dayGrid"></div>
      </section>

      <section class="workspace">
        <aside class="panel day-summary" id="daySummary" aria-live="polite"></aside>
        <section class="panel timeline-panel" aria-labelledby="timelineTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="activeDateLabel">Dia selecionado</p>
              <h2 id="timelineTitle">Agenda do dia</h2>
            </div>
            <div class="filter-row" id="filterRow" aria-label="Filtros"></div>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>
      </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="panel modal-shell">
        <button class="modal-close" id="modalClose" type="button" aria-label="Fechar">✕</button>
        <div class="detail-panel" id="detailPanel" aria-live="polite"></div>
      </div>
    </div>

    <script src="italia.js"></script>
    <script src="pwa.js"></script>
  </body>
</html>
